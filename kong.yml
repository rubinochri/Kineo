_format_version: "3.0"

services:
  - name: kineo-auth
    url: http://auth:5005
    routes:
      - name: route-auth
        paths:
          - /api/login
          - /api/register
        strip_path: false

  - name: kineo-dizionario
    url: http://dizionario:5002
    routes:
      - name: route-translate
        paths:
          - /api/translate
        strip_path: false

      - name: route-dizionario-utente
        paths:
          - ~/api/user/.*/dizionario
        strip_path: false

  - name: kineo-catalogo
    url: http://catalogo:5003
    routes:
      - name: route-catalogo
        paths:
          - /api/videos
        strip_path: false

  - name: kineo-commenti
    url: http://commenti:5006
    routes:
      - name: route-commenti
        paths:
          - /api/comments/all
          - /api/admin/comments
          - /api/commenti
          - ~/api/user/.*/commenti
        strip_path: false

  - name: kineo-monolith
    url: http://monolith:5001
    routes:
      - name: route-monolith-fallback
        paths:
          - /api
        strip_path: false